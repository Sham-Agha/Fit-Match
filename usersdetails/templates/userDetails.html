{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - User Details</title>
    <link rel="icon" type="image/x-icon" href="{% static '/images/Fitmatch-logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/userDetails.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="{% url 'user-details' %}" class="nav-brand">Account</a>
        <div class="nav-links">
            <div class="nav-item dropdown">
                <a href="{% url 'choose-plan' %}">Fitness Dashboard <span class="arrow"></span></a>
            </div>
            <div class="nav-item dropdown">
                <a href="{% url 'calendar' %}">Calender<span class="arrow"></span></a>
            </div>
            <div class="nav-item dropdown">
                <a href="{% url 'help' %}">Help <span class="arrow"></span></a>
            </div>
            <div class="nav-item dropdown">
                <a href="{% url 'logout' %}">Log out <span class="arrow"></span></a>
            </div>
        </div>
        <div class="nav-icon">
            <img src="{% static 'images/Fitmatch-logo.png' %}" alt="Fit Match Logo" class="fitmatch-logo" viewBox="0 0 64 64" width="50" height="50">
                <circle cx="32" cy="10" r="6" fill="#1a3a5c"/>
                <line x1="32" y1="16" x2="32" y2="35" stroke="#1a3a5c" stroke-width="4" stroke-linecap="round"/>
                <line x1="15" y1="20" x2="49" y2="20" stroke="#1a3a5c" stroke-width="4" stroke-linecap="round"/>
                <line x1="32" y1="35" x2="22" y2="55" stroke="#1a3a5c" stroke-width="4" stroke-linecap="round"/>
                <line x1="32" y1="35" x2="42" y2="55" stroke="#1a3a5c" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
    </nav>

    <div class="nav-glow"></div>

    
    <!-- Main Content -->
    <main class="main-content">
        <h1 class="page-title">User Details</h1>
        
        <div class="form-container">
               
            <form class="user-form" method="POST" action="{% url 'save-user-details' %}">
                {% if messages %}
                    {% for message in messages %}
                        <div style="padding: 10px;width: 100%; height: 50px; display: flex; justify-content:center; align-items: center; background-color: rgb(213, 255, 214);">{{ message }}</div>
                    {% endfor %}
                {% endif %} 
                {% csrf_token %}
                <!-- Name Row -->

                <div class="form-row">
                    <div class="form-group">
                        <input type="text" name="first_name" id="firstName" value="{{user.first_name}}" placeholder="First Name">
                    </div>
                    <div class="form-group">
                        <input type="text" name="last_name" id="lastName" value="{{user.last_name}}" placeholder="Last Name">
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group full-width">
                    <input type="email" id="email" name="email" value="{{user.email}}" placeholder="Email">
                </div>

                <!-- Username -->
                <div class="form-group full-width">
                    <input type="text" id="username" name="username" value="{{user.username}}" placeholder="Username">
                </div>

                <!-- Password -->
                <div class="form-group full-width">
                    <input type="password" id="password" name="change_password" placeholder="Change Password">
                </div>


                <!-- Bottom Buttons -->
                <div class="bottom-buttons">
                    <a href="{% url 'edit-survey' %}"><button type="button"  class="btn btn-edit">Reset Workout Plan</button></a>
                    <input type="submit" class="btn btn-save" value="Save"/>
                </div>
            </form>
        </div>
        <div id="modalBox" style="display: none;">
            {% include 'components/modal.html' %}
        </div>
       <div class="university-logo">
    <img src="{% static 'images/UOW-logo.png' %}" alt="University of Westminster Logo" class="uni-logo">
</div>
    </main>
    
</body>
<script>
    const modal = document.getElementById("modalBox");
    const showModal = function(){
        
        modal.style.display = "block";
    }

    const hideModal = function(){
     
        modal.style.display = "none";
    }

</script>
</html>
